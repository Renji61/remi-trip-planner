# Live reload: go install github.com/air-verse/air@latest
# From this folder: air
# Listens on APP_ADDR (default :8051) via scripts/run-dev.cmd

root = "."
tmp_dir = "tmp"

[build]
  cmd = "go build -o ./bin/remi-server.exe ./cmd/server"
  bin = "bin/remi-server.exe"
  full_bin = "scripts\\run-dev.cmd"
  delay = 200
  exclude_dir = ["tmp", "vendor", "data", ".git"]
  exclude_regex = ["_test\\.go$"]
  include_ext = ["go", "html", "css", "js"]
  stop_on_error = true

[log]
  time = true

[misc]
  clean_on_exit = true

[screen]
  clear_on_rebuild = false
  keep_scroll = true
