# Auto-restart dev server on Go/template/static changes.
# Easiest:  .\scripts\dev.ps1   (uses Air if available, else built-in PowerShell watcher)
# Or:       air                 (after: go install github.com/air-verse/air@latest)
# Listen address: set APP_ADDR before air or rely on scripts/run-dev.cmd default :4122.

root = "."
tmp_dir = "tmp"

[build]
  cmd = "go build -o ./bin/remi-server.exe ./cmd/server"
  bin = "bin/remi-server.exe"
  full_bin = "scripts\\run-dev.cmd"
  delay = 200
  exclude_dir = ["tmp", "bin", "vendor", "data", ".git", "web/static/uploads"]
  exclude_regex = ["_test\\.go$"]
  include_ext = ["go", "html", "css", "js", "sql"]
  stop_on_error = true

[log]
  time = true

[misc]
  clean_on_exit = true

[screen]
  clear_on_rebuild = false
  keep_scroll = true
