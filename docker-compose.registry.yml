# REMI Trip Planner — install from a pre-built registry image (no git clone required).
#
# No .env file is required: defaults point at the official public image and host port 4122.
# Optional .env overrides: REMI_IMAGE, REMI_PORT, TZ
#
# Start:
#   docker compose -f docker-compose.registry.yml up -d
#
# Manual update:
#   docker compose -f docker-compose.registry.yml pull
#   docker compose -f docker-compose.registry.yml up -d
#
# Copy-paste / Dockhand with zero env: use docker-compose.install.yml instead.

services:
  remi:
    image: ${REMI_IMAGE:-ghcr.io/renji61/remi-trip-planner:latest}
    container_name: remi-trip-planner
    restart: unless-stopped
    pull_policy: always
    ports:
      - "${REMI_PORT:-4122}:8080"
    environment:
      APP_ADDR: ":8080"
      SQLITE_PATH: /app/data/trips.db
    volumes:
      - remi-data:/app/data
      - remi-uploads:/app/web/static/uploads
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

volumes:
  remi-data:
  remi-uploads:
