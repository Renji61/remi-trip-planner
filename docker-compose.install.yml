# REMI Trip Planner — homelab / one-file install (no .env required).
# Official image (public GHCR): ghcr.io/renji61/remi-trip-planner:latest
#
# Start:
#   docker compose -f docker-compose.install.yml up -d
#
# Update:
#   docker compose -f docker-compose.install.yml pull
#   docker compose -f docker-compose.install.yml up -d
#
# Auto-updates (optional):
#   docker compose -f docker-compose.install.yml --profile watchtower up -d
#
# Change the host port: edit "8080:8080" below (host:container).

services:
  remi:
    image: ghcr.io/renji61/remi-trip-planner:latest
    container_name: remi-trip-planner
    restart: unless-stopped
    pull_policy: always
    ports:
      - "8080:8080"
    environment:
      APP_ADDR: ":8080"
      SQLITE_PATH: /app/data/trips.db
    volumes:
      - remi-data:/app/data
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  watchtower:
    profiles: ["watchtower"]
    image: containrrr/watchtower:1.7.1
    container_name: remi-watchtower
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      WATCHTOWER_LABEL_ENABLE: "true"
      WATCHTOWER_CLEANUP: "true"
      WATCHTOWER_POLL_INTERVAL: "3600"
      TZ: "UTC"

volumes:
  remi-data:
