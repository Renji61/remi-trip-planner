# REMI Trip Planner — homelab / one-file install (no .env required).
# Official image (public GHCR): ghcr.io/renji61/remi-trip-planner:latest
#
# Start:
#   docker compose -f docker-compose.install.yml up -d
#
# Update:
#   docker compose -f docker-compose.install.yml pull
#   docker compose -f docker-compose.install.yml up -d
#
# Change the host port: edit "4122:8080" below (host:container).

services:
  remi-volume-perms:
    image: ghcr.io/renji61/remi-trip-planner:latest
    pull_policy: always
    user: "0:0"
    entrypoint: ["/bin/sh", "-c"]
    command: ["chown -R remi:remi /app/data /app/web/static/uploads"]
    volumes:
      - remi-data:/app/data
      - remi-uploads:/app/web/static/uploads
    restart: "no"

  remi:
    image: ghcr.io/renji61/remi-trip-planner:latest
    container_name: remi-trip-planner
    restart: unless-stopped
    pull_policy: always
    depends_on:
      remi-volume-perms:
        condition: service_completed_successfully
    ports:
      - "4122:8080"
    environment:
      APP_ADDR: ":8080"
      SQLITE_PATH: /app/data/trips.db
    volumes:
      - remi-data:/app/data
      - remi-uploads:/app/web/static/uploads
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

volumes:
  remi-data:
  remi-uploads:
