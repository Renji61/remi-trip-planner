# REMI Trip Planner — self-hosted stack (build from this repository).
#
# Quick start:
#   cp .env.example .env   # optional: set REMI_PORT, etc.
#   docker compose up -d --build
#
# Manual update (rebuild from latest git):
#   git pull && docker compose up -d --build
#
# Default host port is 4122 → container 8080 (override with REMI_PORT in .env).

services:
  # One-shot: named volumes often mount as root:root; app runs as remi — fix ownership before remi starts.
  remi-volume-perms:
    build:
      context: .
      dockerfile: Dockerfile
    image: remi-trip-planner:latest
    user: "0:0"
    entrypoint: ["/bin/sh", "-c"]
    command: ["chown -R remi:remi /app/data /app/web/static/uploads"]
    volumes:
      - remi-data:/app/data
      - remi-uploads:/app/web/static/uploads
    restart: "no"

  remi:
    build:
      context: .
      dockerfile: Dockerfile
    image: remi-trip-planner:latest
    container_name: remi-trip-planner
    restart: unless-stopped
    depends_on:
      remi-volume-perms:
        condition: service_completed_successfully
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    ports:
      - "${REMI_PORT:-4122}:8080"
    environment:
      APP_ADDR: ":8080"
      SQLITE_PATH: /app/data/trips.db
    volumes:
      - remi-data:/app/data
      - remi-uploads:/app/web/static/uploads
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

volumes:
  remi-data:
  remi-uploads:
