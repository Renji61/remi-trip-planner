{{define "tripLongPressSheet"}}
<dialog class="trip-long-press-sheet" id="trip-long-press-sheet" aria-labelledby="trip-long-press-sheet-title">
  <div class="trip-long-press-sheet__panel">
    <div class="trip-long-press-sheet__handle" aria-hidden="true"></div>
    <div class="trip-long-press-sheet__head">
      <p class="trip-long-press-sheet__title" id="trip-long-press-sheet-title"></p>
    </div>
    <div class="trip-long-press-sheet__list" id="trip-long-press-sheet-list" role="group" aria-label="Actions for this item"></div>
    <button type="button" class="trip-long-press-sheet__cancel">Cancel</button>
  </div>
</dialog>
{{end}}
