{{define "tripMobileProfileSheet"}}
<dialog class="trip-mobile-profile-sheet" id="trip-mobile-profile-sheet" aria-label="Account menu">
  <div class="trip-mobile-profile-sheet__panel">
    <div class="trip-mobile-profile-sheet__head">
      <span class="trip-mobile-profile-sheet__title">Account</span>
      <button type="button" class="icon-btn trip-mobile-profile-sheet__close" data-trip-mobile-profile-close data-mobile-profile-close aria-label="Close menu">
        <span class="material-symbols-outlined" aria-hidden="true">close</span>
      </button>
    </div>
    <nav class="trip-mobile-profile-sheet__nav" aria-label="Account actions">
      <a class="trip-mobile-profile-sheet__link" href="/profile">
        <span class="material-symbols-outlined trip-mobile-profile-sheet__link-icon" aria-hidden="true">account_circle</span>
        <span class="trip-mobile-profile-sheet__link-text">Profile</span>
      </a>
      <a class="trip-mobile-profile-sheet__link" href="/trips/{{.Details.Trip.ID}}/settings">
        <span class="material-symbols-outlined trip-mobile-profile-sheet__link-icon" aria-hidden="true">tune</span>
        <span class="trip-mobile-profile-sheet__link-text">Trip settings</span>
      </a>
      <hr class="trip-mobile-profile-sheet__sep" aria-hidden="true">
      <form method="post" action="/logout" class="trip-mobile-profile-sheet__logout-form">
        <input type="hidden" name="csrf_token" value="{{.CSRFToken}}">
        <button type="submit" class="trip-mobile-profile-sheet__link trip-mobile-profile-sheet__link--button trip-mobile-profile-sheet__link--logout">
          <span class="material-symbols-outlined trip-mobile-profile-sheet__link-icon" aria-hidden="true">logout</span>
          <span class="trip-mobile-profile-sheet__link-text">Log out</span>
        </button>
      </form>
    </nav>
  </div>
</dialog>
{{end}}
