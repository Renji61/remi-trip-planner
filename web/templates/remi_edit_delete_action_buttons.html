{{define "remiEditDeleteActionButtons"}}
{{- $edit := index . "editTarget" -}}
{{- $id := index . "itemID" -}}
<div class="remi-slide-actions-group remi-checklist-item-actions">
  <button type="button" class="remi-action-btn remi-action-btn--edit remi-checklist-action-btn remi-checklist-action-btn--secondary" data-inline-edit-open="{{$edit}}">Edit</button>
  <form method="post" action="/checklist/{{$id}}/delete" class="remi-checklist-delete-form remi-action-delete-form" data-app-confirm data-confirm-title="Delete this checklist item?" data-confirm-body="It will be removed from the trip for everyone." data-confirm-ok="Delete item" data-confirm-icon="checklist" data-confirm-variant="danger" data-ajax-submit data-toast-message="Checklist item deleted.">
    {{- with index . "csrfToken"}}<input type="hidden" name="csrf_token" value="{{.}}">{{end -}}
    {{- with index . "returnTo"}}<input type="hidden" name="return_to" value="{{.}}">{{end -}}
    <button type="submit" class="remi-action-btn remi-action-btn--delete remi-checklist-action-btn remi-checklist-action-btn--danger">Delete</button>
  </form>
</div>
{{end}}
